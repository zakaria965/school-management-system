{% extends 'base.html' %}

{% block page_title %}Confirm Delete{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-lg p-6">
        <div class="text-center">
            <div class="w-16 h-16 bg-red-100 dark:bg-red-900/30 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="ri-alert-line text-3xl text-red-600"></i>
            </div>
            <h2 class="text-2xl font-bold mb-2">Confirm Delete</h2>
            <p class="text-gray-500 mb-6">Are you sure you want to delete this? This action cannot be undone.</p>
        </div>
        
        <div class="bg-gray-50 dark:bg-gray-700/50 rounded-lg p-4 mb-6">
            <p class="font-medium">{{ object }}</p>
        </div>
        
        <form method="post" class="flex space-x-4">
            {% csrf_token %}
            <a href="{{ request.META.HTTP_REFERER|default:'/' }}" class="flex-1 px-6 py-3 border border-gray-300 dark:border-gray-600 rounded-xl hover:bg-gray-50 dark:hover:bg-gray-700 transition text-center">
                Cancel
            </a>
            <button type="submit" class="flex-1 px-6 py-3 bg-red-600 text-white rounded-xl hover:bg-red-700 transition">
                Delete
            </button>
        </form>
    </div>
</div>
{% endblock %}
