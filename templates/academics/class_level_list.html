{% extends 'base.html' %}

{% block page_title %}Class Levels{% endblock %}

{% block content %}
<div class="bg-white dark:bg-gray-800 rounded-2xl shadow-lg">
    <div class="p-6 border-b dark:border-gray-700 flex justify-between items-center">
        <div>
            <h2 class="text-2xl font-bold">Class Levels</h2>
            <p class="text-gray-500">Manage class levels</p>
        </div>
        <a href="{% url 'class-level-create' %}" class="px-4 py-2 bg-primary-600 text-white rounded-xl hover:bg-primary-700">
            <i class="ri-add-line mr-2"></i> Add
        </a>
    </div>
    <div class="p-6">
        <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">
            {% for level in class_levels %}
            <div class="p-4 border rounded-xl text-center hover:shadow-md transition">
                <h3 class="font-bold text-lg">{{ level.name }}</h3>
                <p class="text-sm text-gray-500">Level {{ level.numeric_level }}</p>
            </div>
            {% empty %}
            <p class="col-span-full text-gray-500 text-center py-4">No class levels</p>
            {% endfor %}
        </div>
    </div>
</div>
{% endblock %}
