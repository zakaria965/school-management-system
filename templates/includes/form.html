{% extends 'base.html' %}

{% block title %}{{ title|default:"Form" }}{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <h1 class="text-2xl font-bold mb-6">{{ title|default:"Form" }}</h1>
    <div class="bg-white dark:bg-gray-800 p-6 rounded-lg shadow">
        <form method="post" class="space-y-4">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="flex gap-4">
                <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700">Submit</button>
                <a href="{{ back_url|default:'/' }}" class="px-6 py-2 border rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
