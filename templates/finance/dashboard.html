{% extends 'base.html' %}

{% block title %}Finance{% endblock %}

{% block content %}
<h1 class="text-2xl font-bold mb-6">Finance Management</h1>

<div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
    <a href="{% url 'fee-type-list' %}" class="bg-white dark:bg-gray-800 p-6 rounded-lg shadow hover:shadow-lg transition">
        <h3 class="text-lg font-semibold">Fee Types</h3>
    </a>
    <a href="{% url 'fee-structure-list' %}" class="bg-white dark:bg-gray-800 p-6 rounded-lg shadow hover:shadow-lg transition">
        <h3 class="text-lg font-semibold">Fee Structures</h3>
    </a>
    <a href="{% url 'fee-payment-list' %}" class="bg-white dark:bg-gray-800 p-6 rounded-lg shadow hover:shadow-lg transition">
        <h3 class="text-lg font-semibold">Payments</h3>
    </a>
    <a href="{% url 'finance-report' %}" class="bg-white dark:bg-gray-800 p-6 rounded-lg shadow hover:shadow-lg transition">
        <h3 class="text-lg font-semibold">Reports</h3>
    </a>
</div>

<div class="grid grid-cols-1 md:grid-cols-3 gap-6">
    <div class="bg-white dark:bg-gray-800 p-6 rounded-lg shadow">
        <h3 class="text-gray-500 text-sm">Total Income</h3>
        <p class="text-2xl font-bold text-green-600">${{ total_income|default:0 }}</p>
    </div>
    <div class="bg-white dark:bg-gray-800 p-6 rounded-lg shadow">
        <h3 class="text-gray-500 text-sm">Total Expenses</h3>
        <p class="text-2xl font-bold text-red-600">${{ total_expenses|default:0 }}</p>
    </div>
    <div class="bg-white dark:bg-gray-800 p-6 rounded-lg shadow">
        <h3 class="text-gray-500 text-sm">Balance</h3>
        <p class="text-2xl font-bold text-blue-600">${{ balance|default:0 }}</p>
    </div>
</div>
{% endblock %}
