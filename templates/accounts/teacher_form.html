{% extends 'base.html' %}

{% block page_title %}{{ title|default:"Teacher Form" }}{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto">
    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-lg">
        <div class="p-6 border-b dark:border-gray-700">
            <h2 class="text-2xl font-bold">{{ title|default:"Teacher Form" }}</h2>
            <p class="text-gray-500 dark:text-gray-400">Fill in the teacher information</p>
        </div>
        
        <form method="post" class="p-6 space-y-6">
            {% csrf_token %}
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium mb-2">Employee ID *</label>
                    <input type="text" name="employee_id" value="{{ form.employee_id.value|default:'' }}" required
                        class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-xl bg-gray-50 dark:bg-gray-700 focus:ring-2 focus:ring-primary-500">
                </div>
                
                <div>
                    <label class="block text-sm font-medium mb-2">Designation *</label>
                    <input type="text" name="designation" value="{{ form.designation.value|default:'' }}" required
                        class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-xl bg-gray-50 dark:bg-gray-700 focus:ring-2 focus:ring-primary-500">
                </div>
                
                <div>
                    <label class="block text-sm font-medium mb-2">Department *</label>
                    <input type="text" name="department" value="{{ form.department.value|default:'' }}" required
                        class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-xl bg-gray-50 dark:bg-gray-700 focus:ring-2 focus:ring-primary-500">
                </div>
                
                <div>
                    <label class="block text-sm font-medium mb-2">Qualification *</label>
                    <input type="text" name="qualification" value="{{ form.qualification.value|default:'' }}" required
                        class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-xl bg-gray-50 dark:bg-gray-700 focus:ring-2 focus:ring-primary-500">
                </div>
                
                <div>
                    <label class="block text-sm font-medium mb-2">Joining Date *</label>
                    <input type="date" name="joining_date" value="{{ form.joining_date.value|default:'' }}" required
                        class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-xl bg-gray-50 dark:bg-gray-700 focus:ring-2 focus:ring-primary-500">
                </div>
                
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium mb-2">Specializations</label>
                    <textarea name="specializations" rows="3"
                        class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-xl bg-gray-50 dark:bg-gray-700 focus:ring-2 focus:ring-primary-500">{{ form.specializations.value|default:'' }}</textarea>
                </div>
            </div>
            
            <div class="flex justify-end space-x-4 pt-4 border-t dark:border-gray-700">
                <a href="{% url 'teacher-list' %}" class="px-6 py-3 border border-gray-300 dark:border-gray-600 rounded-xl hover:bg-gray-50 dark:hover:bg-gray-700 transition">
                    Cancel
                </a>
                <button type="submit" class="px-6 py-3 bg-primary-600 text-white rounded-xl hover:bg-primary-700 transition">
                    <i class="ri-save-line mr-2"></i> Save Teacher
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
