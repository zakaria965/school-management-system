{% extends 'base.html' %}

{% block auth_content %}
<div class="w-full max-w-md">
    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl p-8 backdrop-blur-sm">
        <div class="text-center mb-8">
            <div class="w-20 h-20 bg-gradient-to-r from-primary-500 to-primary-700 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="ri-school-fill text-4xl text-white"></i>
            </div>
            <h1 class="text-2xl font-bold">School Management</h1>
            <p class="text-gray-500 dark:text-gray-400 mt-1">Sign in to your account</p>
        </div>
        
        <form method="post" class="space-y-5">
            {% csrf_token %}
            
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Username</label>
                <div class="relative">
                    <i class="ri-user-line absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input type="text" name="username" required 
                        class="w-full pl-10 pr-4 py-3 border border-gray-300 dark:border-gray-600 rounded-xl bg-gray-50 dark:bg-gray-700 focus:ring-2 focus:ring-primary-500 focus:border-transparent transition"
                        placeholder="Enter your username">
                </div>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Password</label>
                <div class="relative">
                    <i class="ri-lock-line absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input type="password" name="password" required 
                        class="w-full pl-10 pr-4 py-3 border border-gray-300 dark:border-gray-600 rounded-xl bg-gray-50 dark:bg-gray-700 focus:ring-2 focus:ring-primary-500 focus:border-transparent transition"
                        placeholder="Enter your password">
                </div>
            </div>
            
            <div class="flex items-center justify-between">
                <label class="flex items-center">
                    <input type="checkbox" class="rounded border-gray-300 text-primary-600 focus:ring-primary-500">
                    <span class="ml-2 text-sm text-gray-600 dark:text-gray-400">Remember me</span>
                </label>
                <a href="#" class="text-sm text-primary-600 hover:text-primary-700">Forgot password?</a>
            </div>
            
            <button type="submit" 
                class="w-full bg-gradient-to-r from-primary-500 to-primary-700 text-white py-3 rounded-xl font-semibold hover:from-primary-600 hover:to-primary-800 transition transform hover:scale-[1.02] shadow-lg">
                Sign In
            </button>
        </form>
        
        <div class="mt-6 pt-6 border-t dark:border-gray-700">
            <p class="text-center text-sm text-gray-500 dark:text-gray-400">
                Demo Credentials:<br>
                <span class="font-mono text-xs">admin / admin123</span>
            </p>
        </div>
    </div>
</div>
{% endblock %}
